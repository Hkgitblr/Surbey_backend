name: Spring Boot CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Java (IMPORTANT)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Give permission to mvnw (VERY IMPORTANT)
      - name: Make mvnw executable
        run: chmod +x mvnw

      # 4. Build project
      - name: Build with Maven
        run: ./mvnw clean install -DskipTests

      # 5. Upload JAR (optional but useful)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: target/*.jar