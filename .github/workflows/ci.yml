name: Spring Boot CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Updated version
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Updated version
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ Use Maven wrapper (IMPORTANT)
      - name: Build
        run: ./mvnw clean install